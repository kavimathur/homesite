<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teapot Labs — Something’s brewing</title>
    <meta name="description" content="Teapot Labs. Something’s brewing." />
    <meta name="theme-color" content="#f6f0e0" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🫖</text></svg>"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=VT323&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="hero">
      <div class="stage">
        <svg
          id="scene"
          viewBox="0 0 1000 560"
          role="img"
          aria-label="An illustrated teapot rises, tilts, and pours tea into a passing line of teacups"
        >
          <defs>
            <linearGradient id="teaGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#a87b2a" />
              <stop offset="1" stop-color="#9c7024" />
            </linearGradient>
            <linearGradient id="streamGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#a87b2a" />
              <stop offset="1" stop-color="#a87b2a" />
            </linearGradient>
            <linearGradient id="trackFade" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0" stop-color="#4a4a35" stop-opacity="0" />
              <stop offset="0.12" stop-color="#4a4a35" stop-opacity="0.3" />
              <stop offset="0.88" stop-color="#4a4a35" stop-opacity="0.3" />
              <stop offset="1" stop-color="#4a4a35" stop-opacity="0" />
            </linearGradient>
            <clipPath id="cupClip">
              <path
                d="M -34 -46 C -33 -26 -28 -8 -18 -6 C -12 -5 12 -5 18 -6 C 28 -8 33 -26 34 -46 Z"
              />
            </clipPath>

            <!-- Teacup template: cloned by script.js for each cup on the line -->
            <g id="cup-proto">
              <ellipse class="china saucer" cx="0" cy="0" rx="42" ry="8" />
              <path
                class="china cup-body"
                d="M -34 -46 C -33 -26 -28 -8 -18 -6 C -12 -5 12 -5 18 -6 C 28 -8 33 -26 34 -46 Z"
              />
              <g clip-path="url(#cupClip)">
                <rect
                  class="tea"
                  x="-34"
                  y="-46"
                  width="68"
                  height="44"
                  fill="url(#teaGrad)"
                  transform="translate(0 46)"
                />
              </g>
              <path
                class="cup-handle"
                d="M 34 -34 C 52 -38 58 -24 52 -16 C 47 -9 38 -10 34 -14"
              />
              <ellipse class="china cup-rim" cx="0" cy="-46" rx="34" ry="6" />
              <ellipse class="tea-top" cx="0" cy="-46" rx="28" ry="4.2" opacity="0" />
              <path class="steam s1" d="M -9 -58 C -15 -70 -3 -76 -9 -90" />
              <path class="steam s2" d="M 9 -60 C 4 -72 15 -78 9 -92" />
            </g>
          </defs>

          <!-- Backdrop, track and shadow: hidden until the teapot takes its place -->
          <g class="scene-dress">
            <ellipse cx="600" cy="492" rx="80" ry="6" class="pot-shadow" />
            <rect x="40" y="491" width="920" height="3" rx="1.5" fill="url(#trackFade)" />
          </g>

          <g id="cups"></g>

          <g class="pour">
            <path
              id="stream"
              d="M -3.5 0 C -3.5 60 -5 120 -5.5 178 L -5.5 184 L 5.5 184 L 5.5 178 C 5 120 3.5 60 3.5 0 Z"
              fill="url(#streamGrad)"
            />
            <ellipse id="splash" cx="483" cy="434" rx="9" ry="3" />
          </g>

          <g id="pot" transform="translate(500 310) rotate(0)">
            <g transform="scale(1.3)">
              <path class="pot-steam ps1" d="M -8 -84 C -14 -98 -2 -104 -8 -118" />
              <path class="pot-steam ps2" d="M 6 -88 C 1 -100 12 -106 6 -120" />
              <ellipse class="china" cx="0" cy="45" rx="24" ry="6" />
              <ellipse class="china pot-body" cx="0" cy="0" rx="56" ry="46" />
              <path
                class="spout-fill"
                d="M -46 10 C -68 2 -80 -16 -84 -44 L -70 -52 C -62 -34 -52 -24 -42 -18 Z"
              />
              <path
                class="spout-line"
                d="M -46 10 C -68 2 -80 -16 -84 -44 M -70 -52 C -62 -34 -52 -24 -42 -18"
              />
              <path class="stripe" d="M -50 16 Q 0 34 50 16" />
              <path
                class="pot-handle"
                d="M 48 -20 C 76 -30 92 -8 84 10 C 78 24 62 30 50 26"
              />
              <path class="china" d="M -22 -47 Q 0 -70 22 -47 Z" />
              <ellipse class="china" cx="0" cy="-44" rx="30" ry="8" />
              <circle class="china" cx="0" cy="-64" r="6.5" />
            </g>
          </g>
        </svg>
      </div>

      <header class="copy">
        <p class="brand">Teapot Labs</p>
        <h1 class="headline">Something’s <em>brewing</em></h1>
      </header>
    </main>
    <script src="script.js"></script>
  </body>
</html>
