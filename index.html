<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teapot Labs - Coming Soon</title>
    <link
      href="https://fonts.googleapis.com/css2?family=VT323&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <nav class="nav-links">
        <a href="privacy.html">Privacy Policy</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="animation-container">
        <svg
          id="teapot-animation"
          width="400"
          height="300"
          viewBox="0 0 400 300"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <!-- Teapot (centered, clean line drawing) -->
          <g
            id="teapot-group"
            transform="translate(200, 155)"
            stroke="#4a4a35"
            stroke-width="5"
            stroke-linejoin="round"
            stroke-linecap="round"
            fill="none"
          >
            <!-- Body (rounded pot shape) -->
            <ellipse cx="0" cy="0" rx="45" ry="38" />

            <!-- Spout (proper tapered spout curving up and left) -->
            <path
              d="M -42 -8 Q -52 -12, -58 -20 Q -62 -28, -68 -35 L -72 -42"
            />
            <path
              d="M -38 -18 Q -48 -22, -54 -28 Q -58 -34, -64 -40 L -68 -46"
            />
            <!-- Spout tip (connects the two lines) -->
            <path d="M -72 -42 Q -71 -44, -68 -46" />

            <!-- Handle (elegant ear shape on right) -->
            <path d="M 42 -12 Q 62 -18, 68 0 Q 62 18, 42 12" />

            <!-- Lid rim -->
            <ellipse cx="0" cy="-38" rx="28" ry="7" />

            <!-- Lid dome -->
            <path d="M -20 -42 Q -10 -52, 0 -54 Q 10 -52, 20 -42" />

            <!-- Lid knob -->
            <ellipse cx="0" cy="-58" rx="6" ry="4" />
            <path d="M 0 -54 L 0 -54" />

            <!-- Base (subtle foot) -->
            <ellipse cx="0" cy="38" rx="25" ry="5" />
          </g>

          <!-- Steam wisps (animated, coming from spout tip) -->
          <g
            id="steam-group"
            stroke="#9a9a7a"
            stroke-width="3"
            fill="none"
            stroke-linecap="round"
          >
            <path id="steam1">
              <animate
                attributeName="d"
                values="M 130 108 Q 122 95, 118 80 Q 114 65, 120 50;M 130 108 Q 118 92, 112 78 Q 108 62, 116 48;M 130 108 Q 122 95, 118 80 Q 114 65, 120 50"
                dur="2.5s"
                repeatCount="indefinite"
              />
              <animate
                attributeName="opacity"
                values="0;0.5;0.4;0"
                dur="2.5s"
                repeatCount="indefinite"
              />
            </path>
            <path id="steam2">
              <animate
                attributeName="d"
                values="M 126 112 Q 116 96, 110 80 Q 104 64, 108 48;M 126 112 Q 112 94, 104 78 Q 98 62, 104 46;M 126 112 Q 116 96, 110 80 Q 104 64, 108 48"
                dur="2.8s"
                begin="0.4s"
                repeatCount="indefinite"
              />
              <animate
                attributeName="opacity"
                values="0;0.45;0.35;0"
                dur="2.8s"
                begin="0.4s"
                repeatCount="indefinite"
              />
            </path>
          </g>
        </svg>
      </div>
      <h1 class="message">Something's brewing</h1>
    </div>
    <script src="script.js"></script>
  </body>
</html>
